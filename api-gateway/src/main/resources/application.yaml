server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth-service/**
              filters:
                - StripPrefix=1
            - id: auction-ws
              uri: lb:ws://auction-service
              predicates:
                - Path=/auction-service/ws/**
              filters:
                - StripPrefix=1
            - id: auction-service
              uri: lb://auction-service
              predicates:
                - Path=/auction-service/**
              filters:
                - StripPrefix=1
            - id: bidding-service
              uri: lb://auction-service
              predicates:
                - Path=/bidding-service/**
              filters:
                - StripPrefix=1
            - id: websocket-service
              uri: lb://auction-service
              predicates:
                - Path=/websocket-service/**
              filters:
                - StripPrefix=1

  profiles:
    active: dev

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

# Logging for debugging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
