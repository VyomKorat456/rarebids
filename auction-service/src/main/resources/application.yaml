server:
  port: 8082

spring:
  application:
    name: auction-service
  profiles:
    active: dev
  cloud:
    openfeign:
      client:
        config:
           default:
            connectTimeout: 60000
            readTimeout: 60000
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/bid-realm}
            jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/bid-realm/protocol/openid-connect/certs}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: true
    ip-address: ${INSTANCE_IP:127.0.0.1}

app:
  upload:
    dir: ${UPLOAD_DIR:/app/uploads/images}
