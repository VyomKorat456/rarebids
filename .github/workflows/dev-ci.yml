name: Development CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ 'feature/**' ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, auction-service, api-gateway, notification-service]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean test -Dtest=*ServiceTest

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
