name: Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, auction-service, api-gateway, notification-service, eureka-server]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean install -DskipTests
          ./mvnw test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, auction-service, api-gateway, notification-service, eureka-server]
    
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t bid-system/${{ matrix.service }}:latest ./${{ matrix.service }}

      # In a real scenario, we would push to a registry here
      # - name: Push to Registry
      #   run: docker push ...
