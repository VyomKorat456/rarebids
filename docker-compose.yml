version: '3.8'

services:


  adminer:
    image: adminer
    ports:
      - "8090:8080"
    networks:
      - bid-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - bid-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8099:8081"
    depends_on:
      - redis
    networks:
      - bid-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    environment:
      DOZZLE_USERNAME: admin
      DOZZLE_PASSWORD: admin
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bid-network

networks:
  bid-network:
    driver: bridge
