version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: keycloak-prod
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${RDS_HOSTNAME}:${RDS_PORT:-5432}/${RDS_KEYCLOAK_DB:-keycloak_db}
      KC_DB_USERNAME: ${RDS_USERNAME}
      KC_DB_PASSWORD: ${RDS_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: 51.21.181.153
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    command: start-dev --hostname 51.21.181.153 --proxy-headers xforwarded
    ports:
      - "8180:8080"
    networks:
      - bid-network
    restart: always

  redis:
    image: redis:alpine
    container_name: redis-prod
    networks:
      - bid-network
    restart: unless-stopped

  # --- MICROSERVICES ---
  eureka-server:
    image: vyomkorat/bid-system-eureka-server:latest
    container_name: eureka-server-prod
    # JVM Optimization: Limit memory for Eureka
    environment:
      JAVA_OPTS: "-Xmx128m"
    ports:
      - "8761:8761"
    networks:
      - bid-network

  auth-service:
    image: vyomkorat/bid-system-auth-service:latest
    container_name: auth-service-prod
    environment:
      JAVA_OPTS: "-Xmx256m"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KEYCLOAK_SERVER_URL: http://keycloak-prod:8080/auth
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak-prod:8080/auth
      KEYCLOAK_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    depends_on:
      - eureka-server
      - keycloak
    networks:
      - bid-network
    restart: always

  auction-service:
    image: vyomkorat/bid-system-auction-service:latest
    container_name: auction-service-prod
    environment:
      JAVA_OPTS: "-Xmx384m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://${RDS_HOSTNAME}:${RDS_PORT:-5432}/${RDS_AUCTION_DB:-auction_db}
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      KEYCLOAK_SERVER_URL: http://keycloak-prod:8080/auth
      KEYCLOAK_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak-prod:8080/auth/realms/bid-realm/protocol/openid-connect/certs
      UPLOAD_DIR: /app/uploads/images
    volumes:
      - auction_uploads:/app/uploads/images
    depends_on:
      - redis
      - eureka-server
      - keycloak
    networks:
      - bid-network
    restart: always

  notification-service:
    image: vyomkorat/bid-system-notification-service:latest
    container_name: notification-service-prod
    environment:
      JAVA_OPTS: "-Xmx128m"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak-prod:8080/auth/realms/bid-realm/protocol/openid-connect/certs
    depends_on:
      - eureka-server
    networks:
      - bid-network

  api-gateway:
    image: vyomkorat/bid-system-api-gateway:latest
    container_name: api-gateway-prod
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx256m"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak-prod:8080/auth/realms/bid-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak-prod:8080/auth/realms/bid-realm/protocol/openid-connect/certs
    depends_on:
      - eureka-server
    networks:
      - bid-network

  frontend:
    image: vyomkorat/bid-system-frontend:latest
    container_name: frontend-prod
    ports:
      - "80:80"
    networks:
      - bid-network

networks:
  bid-network:
    driver: bridge

volumes:
  auction_uploads:
